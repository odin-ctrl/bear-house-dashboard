
<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear House NESBYEN - August 2024</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #e67e22;
            padding-bottom: 15px;
        }
        .subtitle {
            color: #7f8c8d;
            font-style: italic;
            margin-top: -10px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .kpi-card {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .kpi-label {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .kpi-value {
            color: #2c3e50;
            font-size: 28px;
            font-weight: bold;
            margin-top: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ecf0f1;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .rank {
            font-weight: bold;
            color: #e67e22;
        }
        .footer {
            text-align: center;
            color: #95a5a6;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐻 Bear House NESBYEN</h1>
        <p class="subtitle">August 2024 - Sesongrapport for franchise-vurdering</p>
        
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Omsetning</div>
                <div class="kpi-value">0 kr</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Antall ordrer</div>
                <div class="kpi-value">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Snittkurv</div>
                <div class="kpi-value">0 kr</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Varer per ordre</div>
                <div class="kpi-value">NaN</div>
            </div>
        </div>
        
        <h2>🏆 Topp 20 Produkter</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Produkt</th>
                    <th>Solgt</th>
                    <th>Omsetning</th>
                    <th>Snitt pris</th>
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
        
        <div class="footer">
            Generert av Bear House Dashboard<br>
            Kontakt: martin@bearhouse.no
        </div>
    </div>
</body>
</html>
