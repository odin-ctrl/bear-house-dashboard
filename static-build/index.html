<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear House Dashboard ☕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="bearhousekaffekopp.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0c;
            --bg-card: #121215;
            --bg-card-hover: #1a1a1f;
            --neon-orange: #ff6b35;
            --neon-pink: #ff2d95;
            --neon-purple: #b347ff;
            --neon-blue: #00d4ff;
            --gold: #ffc857;
            --cream: #fff5e6;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* Loading screen */
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--bg-card);
            border-top-color: var(--neon-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Login page */
        #login-page {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(255, 107, 53, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(179, 71, 255, 0.15) 0%, transparent 50%),
                var(--bg-dark);
        }
        
        .login-container {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo img {
            width: 120px;
            height: auto;
        }
        
        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--neon-orange), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-dark);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--neon-orange);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }
        
        .login-error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        /* Dashboard page */
        #dashboard-page {
            display: none;
        }
        
        .dashboard-header {
            background: var(--bg-card);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-logo {
            width: 48px;
            height: 48px;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-info {
            text-align: right;
        }
        
        .user-name {
            font-weight: 600;
        }
        
        .user-role {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.2);
            color: var(--danger);
        }
        
        .dashboard-content {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-4px);
        }
        
        .stat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .stat-icon.orange { background: rgba(255, 107, 53, 0.2); }
        .stat-icon.purple { background: rgba(179, 71, 255, 0.2); }
        .stat-icon.blue { background: rgba(0, 212, 255, 0.2); }
        .stat-icon.gold { background: rgba(255, 200, 87, 0.2); }
        
        .stat-title {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
        }
        
        .stat-change {
            font-size: 14px;
            color: var(--success);
        }
        
        .stat-change.negative { color: var(--danger); }
        
        /* Location cards */
        .locations-section {
            margin-top: 32px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .location-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border-left: 4px solid var(--neon-orange);
        }
        
        .location-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .location-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        
        .location-stat {
            text-align: center;
        }
        
        .location-stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .location-stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .location-stats {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading screen -->
    <div id="loading">
        <div class="loader"></div>
    </div>
    
    <!-- Login page -->
    <div id="login-page">
        <div class="login-container">
            <div class="login-logo">
                <img src="bearhousekaffekopp.png" alt="Bear House">
            </div>
            <h1 class="login-title">Bear House</h1>
            <p class="login-subtitle">Logg inn for å se dashboardet</p>
            
            <div id="login-error" class="login-error"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Brukernavn</label>
                    <input type="text" id="username" name="username" placeholder="Ditt brukernavn" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Passord</label>
                    <input type="password" id="password" name="password" placeholder="Din bursdag (DDMM)" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">Logg inn</button>
            </form>
        </div>
    </div>
    
    <!-- Dashboard page -->
    <div id="dashboard-page">
        <header class="dashboard-header">
            <div class="header-left">
                <img src="bearhousekaffekopp.png" alt="Bear House" class="header-logo">
                <h1 class="header-title">Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-name" id="user-name"></div>
                    <div class="user-role" id="user-role"></div>
                </div>
                <button class="logout-btn" onclick="logout()">Logg ut</button>
            </div>
        </header>
        
        <main class="dashboard-content">
            <!-- Summary stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon orange">💰</div>
                        <div class="stat-title">Dagens omsetning</div>
                    </div>
                    <div class="stat-value" id="total-sales">-</div>
                    <div class="stat-change" id="sales-change">Laster...</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon purple">🛒</div>
                        <div class="stat-title">Antall salg</div>
                    </div>
                    <div class="stat-value" id="total-orders">-</div>
                    <div class="stat-change" id="orders-change">Laster...</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon blue">📊</div>
                        <div class="stat-title">Snittpris</div>
                    </div>
                    <div class="stat-value" id="avg-ticket">-</div>
                    <div class="stat-change" id="ticket-change">Laster...</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon gold">📍</div>
                        <div class="stat-title">Aktive lokasjoner</div>
                    </div>
                    <div class="stat-value" id="active-locations">3</div>
                    <div class="stat-change">Nesbyen • Hemsedal • Ål</div>
                </div>
            </div>
            
            <!-- Location breakdown -->
            <section class="locations-section">
                <h2 class="section-title">📍 Per lokasjon</h2>
                <div class="location-grid" id="location-grid">
                    <!-- Filled by JavaScript -->
                </div>
            </section>
        </main>
    </div>
    
    <script>
        // API base URL - change this for production
        const API_BASE = 'api';
        
        // State
        let currentUser = null;
        let authToken = null;
        
        // DOM elements
        const loadingEl = document.getElementById('loading');
        const loginPage = document.getElementById('login-page');
        const dashboardPage = document.getElementById('dashboard-page');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        
        // Initialize app
        async function init() {
            // Check if already logged in
            const savedUser = localStorage.getItem('bearhouse_user');
            const savedToken = localStorage.getItem('bearhouse_token');
            
            if (savedUser && savedToken) {
                try {
                    currentUser = JSON.parse(savedUser);
                    authToken = savedToken;
                    showDashboard();
                    loadDashboardData();
                } catch (e) {
                    showLogin();
                }
            } else {
                showLogin();
            }
            
            // Hide loading
            loadingEl.style.display = 'none';
        }
        
        // Show login page
        function showLogin() {
            loginPage.style.display = 'flex';
            dashboardPage.style.display = 'none';
        }
        
        // Show dashboard
        function showDashboard() {
            loginPage.style.display = 'none';
            dashboardPage.style.display = 'block';
            
            // Update user info
            document.getElementById('user-name').textContent = currentUser.name || currentUser.username;
            document.getElementById('user-role').textContent = currentUser.role === 'admin' ? 'Administrator' : 'Ansatt';
        }
        
        // Login form handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            loginError.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/auth.php?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    loginError.textContent = data.error;
                    loginError.style.display = 'block';
                    return;
                }
                
                // Save session
                currentUser = data.user;
                authToken = data.token;
                localStorage.setItem('bearhouse_user', JSON.stringify(currentUser));
                localStorage.setItem('bearhouse_token', authToken);
                
                showDashboard();
                loadDashboardData();
                
            } catch (err) {
                loginError.textContent = 'Kunne ikke koble til server';
                loginError.style.display = 'block';
            }
        });
        
        // Logout
        function logout() {
            localStorage.removeItem('bearhouse_user');
            localStorage.removeItem('bearhouse_token');
            currentUser = null;
            authToken = null;
            showLogin();
        }
        
        // Load dashboard data
        async function loadDashboardData() {
            try {
                const response = await fetch(`${API_BASE}/favrit.php?action=today`, {
                    headers: { 'X-Auth-Token': authToken }
                });
                
                const data = await response.json();
                
                if (data.error) {
                    console.error('API error:', data.error);
                    return;
                }
                
                // Calculate totals
                let totalSales = 0;
                let totalOrders = 0;
                
                const locationGrid = document.getElementById('location-grid');
                locationGrid.innerHTML = '';
                
                const locationNames = {
                    nesbyen: 'Nesbyen',
                    hemsedal: 'Hemsedal',
                    hemsedal_takeaway: 'Hemsedal Takeaway',
                    al_bakeri: 'Ål Bakeri',
                    al_bearhouse: 'Ål Bear House',
                    nesbyen_pizzeria: 'Nesbyen Pizzeria'
                };
                
                for (const [key, stats] of Object.entries(data)) {
                    totalSales += stats.total || 0;
                    totalOrders += stats.orders || 0;
                    
                    // Create location card
                    const card = document.createElement('div');
                    card.className = 'location-card';
                    card.innerHTML = `
                        <div class="location-name">${locationNames[key] || key}</div>
                        <div class="location-stats">
                            <div class="location-stat">
                                <div class="location-stat-value">${formatCurrency(stats.total)}</div>
                                <div class="location-stat-label">Omsetning</div>
                            </div>
                            <div class="location-stat">
                                <div class="location-stat-value">${stats.orders}</div>
                                <div class="location-stat-label">Salg</div>
                            </div>
                            <div class="location-stat">
                                <div class="location-stat-value">${formatCurrency(stats.avgTicket)}</div>
                                <div class="location-stat-label">Snitt</div>
                            </div>
                        </div>
                    `;
                    locationGrid.appendChild(card);
                }
                
                // Update summary
                document.getElementById('total-sales').textContent = formatCurrency(totalSales);
                document.getElementById('total-orders').textContent = totalOrders;
                document.getElementById('avg-ticket').textContent = totalOrders > 0 
                    ? formatCurrency(totalSales / totalOrders) 
                    : '-';
                
                // Clear "loading" texts
                document.getElementById('sales-change').textContent = 'I dag';
                document.getElementById('orders-change').textContent = 'I dag';
                document.getElementById('ticket-change').textContent = 'I dag';
                
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }
        
        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('nb-NO', {
                style: 'currency',
                currency: 'NOK',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(amount);
        }
        
        // Auto-refresh every 5 minutes
        setInterval(() => {
            if (currentUser) {
                loadDashboardData();
            }
        }, 5 * 60 * 1000);
        
        // Start app
        init();
    </script>
</body>
</html>
