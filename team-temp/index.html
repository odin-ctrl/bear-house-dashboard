<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear House Dashboard</title>
    <meta http-equiv="refresh" content="3;url=https://bearhouse-dashboard.loca.lt">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0c 0%, #1a1a1f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #888; margin-bottom: 2rem; }
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #ff6b35;
            border-radius: 50%;
            margin: 0 auto 2rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a {
            color: #ff6b35;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Bear House Dashboard</h1>
        <p>Omdirigerer til dashboard...</p>
        <p><small>Hvis du ikke blir omdirigert automatisk, <a href="https://bearhouse-dashboard.loca.lt">klikk her</a></small></p>
    </div>
</body>
</html>
